name: YouTube Download Action

on:
  workflow_dispatch: # تشغيل يدوي من تبويب Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ضروري للسماح برفع الملفات للمستودع

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Run Download Script
        run: python download_short.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "shorts" ] && [ "$(ls -A shorts)" ]; then
            git add shorts/
            git commit -m "Auto-downloaded video"
            git push
          else
            echo "No files to upload."
          fi
