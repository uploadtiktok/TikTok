name: Download via Tor Proxy

on:
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  download:
    runs-on: ubuntu-latest
    # Granting write permissions to allow the action to push files back to the repo
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y tor

      - name: Start Tor Service
        run: |
          sudo service tor start
          # Wait for Tor to establish a circuit
          sleep 20

      - name: Execute Python Script
        run: python download_short.py

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shorts/*
          # Only commit if there are new files to avoid workflow errors
          git commit -m "System: Auto-downloaded short via Tor" || echo "No new files to commit"
          git push
