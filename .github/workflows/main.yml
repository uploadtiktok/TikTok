name: Simple Download without Tor

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Latest yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/yt-dlp/yt-dlp.git # تثبيت نسخة المطورين الأحدث

      - name: Run Download Script
        run: python download_short.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "shorts" ] && [ "$(ls -A shorts)" ]; then
            git add shorts/
            git commit -m "Auto-downloaded via GitHub Action"
            git push
          fi
