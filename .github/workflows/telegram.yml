name: Fetch Telegram Videos

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install telethon
          
      - name: Run video fetcher
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
          CHANNEL_USERNAME: ${{ secrets.CHANNEL_USERNAME }}
          BATCH_SIZE: ${{ secrets.BATCH_SIZE }}
        run: |
          python fetch_videos.py
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # جلب آخر التغييرات
          git fetch origin main
          git reset --hard origin/main || true
          
          # إضافة جميع الملفات المتغيرة (بما فيها last_message_id.json المعدل)
          git add -A
          
          # التحقق من وجود تغييرات
          if ! git diff --cached --quiet; then
            git commit -m "Auto: Add new videos from Telegram [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push origin main
          else
            echo "No new changes to commit"
          fi
