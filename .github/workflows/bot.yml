name: TikTok Bot

on:
  schedule:
    # Run daily at 00:00 UTC (which is 01:00 Algeria time in winter, 00:00 in summer)
    # Adjust as needed
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow pushing to repository
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create Videos directory
      run: |
        mkdir -p Videos
    
    - name: Run bot
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_BRANCH: ${{ github.ref_name }}
      run: |
        python bot.py
    
    - name: Push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Videos/ rss.xml processed_urls.txt 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto update from bot [skip ci]"
        git push
