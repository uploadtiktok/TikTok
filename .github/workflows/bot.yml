name: Daily Video RSS Update
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests pytz
      
      - name: Run bot
        run: python bot.py
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}  # تغيير هنا
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: main
